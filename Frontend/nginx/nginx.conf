server {

  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Root location - redirect to e-standard
  location = / {
    return 301 /e-standard/;
  }

  # Handle static assets in e-standard path (must be before /e-standard/ location)
  # This regex matches files in /e-standard/assets/ directory
  location ~ ^/e-standard/assets/(.+)$ {
    alias /usr/share/nginx/html/assets/$1;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # e-standard base path - serve files from root directory
  location /e-standard/ {
    alias /usr/share/nginx/html/;
    # Only try files, don't add trailing slash for existing files
    try_files $uri @e-standard_fallback;
  }

  # Fallback for SPA routing - serve index.html
  location @e-standard_fallback {
    root /usr/share/nginx/html;
    try_files /index.html =404;
  }

  error_page   500 502 503 504  /50x.html;

  location = /50x.html {
    root   /usr/share/nginx/html;
  }

}